<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario Agrícola - Los 3 Patitos</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2, h3 { color: #2d5a27; border-bottom: 2px solid #2d5a27; padding-bottom: 8px; margin-top: 30px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-green { background-color: #28a745; margin-top: 10px; }
        .btn-green:hover { background-color: #218838; }
        .btn-blue { background-color: #007bff; }
        .btn-blue:hover { background-color: #0069d9; }
        .btn-gray { background-color: #6c757d; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #2d5a27; color: white; }
        .hidden { display: none; }
        .badge { background: #e9ecef; padding: 8px 15px; border-radius: 20px; font-weight: bold; float: right; color: #495057; border: 1px solid #ced4da; }
    </style>
</head>
<body>
    <div class="container">
        <div id="seccion-login">
            <h2 style="text-align: center;">Ingreso al Sistema</h2>
            <input type="text" id="user" placeholder="Nombre de usuario">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="btn-green" onclick="ejecutarLogin()">Iniciar Sesión</button>
            <p id="msg-login" style="color: #dc3545; text-align: center; margin-top: 15px; font-weight: bold;"></p>
        </div>

        <div id="panel-principal" class="hidden">
            <span class="badge" id="info-rol"></span>
            <h2>Gestión de Inventario</h2>

            <div id="modulo-registro-productos">
                <h3>Registrar Nuevo Producto</h3>
                <input type="text" id="p-codigo" placeholder="Código (Ej: FER-2024)">
                <input type="text" id="p-nombre" placeholder="Nombre del Producto">
                <input type="number" id="p-cant" placeholder="Cantidad disponible">
                <input type="number" id="p-precio" placeholder="Precio unitario">
                <button class="btn-green" onclick="guardarProducto()">Guardar en Inventario</button>
            </div>

            <h3>Productos en Sistema</h3>
            <table>
                <thead><tr><th>Código</th><th>Nombre</th><th>Cantidad</th><th>Precio</th></tr></thead>
                <tbody id="lista-productos"></tbody>
            </table>

            <div id="modulo-usuarios" class="hidden">
                <h3>Control de Usuarios y Roles (SuperAdmin)</h3>
                <input type="text" id="u-nombre" placeholder="Nuevo Username">
                <input type="password" id="u-pass" placeholder="Password (Hash BCrypt)">
                <select id="u-rol">
                    <option value="REGISTRADOR">REGISTRADOR</option>
                    <option value="AUDITOR">AUDITOR</option>
                    <option value="SUPERADMIN">SUPERADMIN</option>
                </select>
                <button class="btn-blue" onclick="guardarUsuario()">Registrar Usuario</button>
            </div>

            <button class="btn-gray" onclick="location.reload()">Cerrar Sesión Segura</button>
        </div>
    </div>

    <script>
        const API_URL = "https://backend-agricola.onrender.com";
        let AUTH_HEADER = "";

        async function ejecutarLogin() {
            const usuario = document.getElementById('user').value;
            const clave = document.getElementById('pass').value;
            
            AUTH_HEADER = 'Basic ' + btoa(usuario + ':' + clave);

            try {
                const resp = await fetch(`${API_URL}/api/usuarios/login`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': AUTH_HEADER
                    },
                    body: JSON.stringify({ username: usuario, password: clave })
                });

                const texto = await resp.text();
                
                if (resp.ok && texto.includes("✅")) {
                    // Extraer Rol para RBAC (RF-05)
                    const rol = texto.split("|")[1]?.trim() || "USER";

                    document.getElementById('seccion-login').classList.add('hidden');
                    document.getElementById('panel-principal').classList.remove('hidden');
                    document.getElementById('info-rol').textContent = `Rol: ${rol}`;

                    // Lógica de visualización por roles (RF-05)
                    if (rol === "SUPERADMIN") {
                        document.getElementById('modulo-usuarios').classList.remove('hidden');
                    }
                    if (rol === "AUDITOR") {
                        document.getElementById('modulo-registro-productos').classList.add('hidden');
                    }

                    cargarProductos();
                } else {
                    document.getElementById('msg-login').textContent = "Credenciales inválidas o acceso denegado";
                }
            } catch (e) {
                document.getElementById('msg-login').textContent = "Error de conexión con el backend";
            }
        }

        // CUMPLE RS-02: Protección contra XSS usando textContent
        async function cargarProductos() {
            const resp = await fetch(`${API_URL}/api/productos`, {
                headers: { 'Authorization': AUTH_HEADER }
            });
            const prods = await resp.json();
            const lista = document.getElementById('lista-productos');
            lista.innerHTML = ""; 

            prods.forEach(p => {
                const tr = document.createElement('tr');
                const campos = [p.codigo, p.nombre, p.cantidad, `$${p.precio}`];
                
                campos.forEach(texto => {
                    const td = document.createElement('td');
                    td.textContent = texto; // ESCAPA CUALQUIER SCRIPT INYECTADO
                    tr.appendChild(td);
                });
                lista.appendChild(tr);
            });
        }

        async function guardarProducto() {
            const p = { 
                codigo: document.getElementById('p-codigo').value, 
                nombre: document.getElementById('p-nombre').value,
                cantidad: parseInt(document.getElementById('p-cant').value),
                precio: parseFloat(document.getElementById('p-precio').value)
            };
            
            const resp = await fetch(`${API_URL}/api/productos`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': AUTH_HEADER
                },
                body: JSON.stringify(p)
            });

            if(resp.ok) {
                alert("Producto registrado correctamente");
                cargarProductos();
            } else {
                alert("No tienes permisos para realizar esta acción (403)");
            }
        }
    </script>
</body>
</html>
