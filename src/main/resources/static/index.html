<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Agrícola - Los 3 Patitos</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 20px auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .hidden { display: none; } 
        input, button, select { padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #218838; }
        .btn-logout { background-color: #6c757d; width: auto; padding: 10px 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #2d5a27; color: white; }
        .rol-badge { background: #e9ecef; padding: 5px 10px; border-radius: 20px; font-size: 0.85em; color: #495057; border: 1px solid #dee2e6; }
        .seccion { border-top: 2px solid #2d5a27; margin-top: 30px; padding-top: 20px; }
        #msg-login { font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="seccion-login">
        <h2 style="color: #2d5a27;">Ingreso al Sistema</h2>
        <input type="text" id="user" placeholder="Nombre de usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="ejecutarLogin()">Entrar al Sistema</button>
        <p id="msg-login" style="color: #dc3545;"></p>
    </div>

    <div id="panel-principal" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0; color: #2d5a27;">Panel de Control Agrícola</h2>
            <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
        <div style="margin-bottom: 25px;">
            <span id="info-rol" class="rol-badge"></span>
        </div>

        <div id="modulo-productos" class="seccion">
            <h3>Gestión de Inventario</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f8f9fa; padding: 15px; border-radius: 6px;">
                <input type="text" id="p-codigo" placeholder="Código">
                <input type="text" id="p-nombre" placeholder="Nombre del producto">
                <input type="number" id="p-cant" placeholder="Cantidad">
                <input type="number" id="p-precio" placeholder="Precio unitario">
                <button onclick="guardarProducto()" style="grid-column: span 2;">Registrar Producto</button>
            </div>
            <table>
                <thead>
                    <tr><th>Código</th><th>Nombre</th><th>Cantidad</th><th>Precio</th></tr>
                </thead>
                <tbody id="lista-productos"></tbody>
            </table>
        </div>

        <div id="modulo-usuarios" class="seccion hidden">
            <h3>Administración de Usuarios</h3>
            <table>
                <thead>
                    <tr><th>ID</th><th>Usuario</th><th>Rol asignado</th></tr>
                </thead>
                <tbody id="lista-usuarios"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const API_URL = window.location.origin; 
let ROL_ACTUAL = "";
let AUTH_HEADER = ""; 

async function ejecutarLogin() {
    const usuario = document.getElementById('user').value;
    const clave = document.getElementById('pass').value;
    
    // Crear la credencial de seguridad
    AUTH_HEADER = 'Basic ' + btoa(usuario + ':' + clave);

    try {
        const resp = await fetch(`${API_URL}/api/usuarios/login`, {
            method: 'POST',
            headers: { 
                'Authorization': AUTH_HEADER, 
                'Content-Type': 'application/json' 
            },
            body: JSON.stringify({ username: usuario, password: clave })
        });

        const texto = await resp.text();
        
        if (resp.ok && texto.includes("✅")) {
            const partes = texto.split("|");
            ROL_ACTUAL = partes[1].toUpperCase().trim();
            
            document.getElementById('seccion-login').classList.add('hidden');
            document.getElementById('panel-principal').classList.remove('hidden');
            document.getElementById('info-rol').innerText = "Usuario: " + usuario + " | Rol: " + ROL_ACTUAL;
            
            if (ROL_ACTUAL === "ADMIN" || ROL_ACTUAL === "SUPERADMIN") {
                document.getElementById('modulo-usuarios').classList.remove('hidden');
            }
            
            cargarProductos();
            cargarUsuarios();
        } else {
            document.getElementById('msg-login').innerText = "Acceso denegado: Credenciales no válidas";
        }
    } catch (err) {
        document.getElementById('msg-login').innerText = "Error: No se pudo conectar con el servidor";
    }
}

async function cargarProductos() {
    try {
        const resp = await fetch(`${API_URL}/api/productos`, { 
            headers: { 'Authorization': AUTH_HEADER } 
        });
        
        if (resp.status === 401) return; // Sesión no válida, no hacer nada

        const data = await resp.json();
        const tbody = document.getElementById('lista-productos');
        tbody.innerHTML = data.map(p => 
            `<tr><td>${p.codigo}</td><td>${p.nombre}</td><td>${p.cantidad}</td><td>$${p.precio}</td></tr>`
        ).join('');
    } catch (e) {
        console.log("Error al cargar lista de productos");
    }
}

async function cargarUsuarios() {
    if (ROL_ACTUAL !== "ADMIN" && ROL_ACTUAL !== "SUPERADMIN") return;
    
    try {
        const resp = await fetch(`${API_URL}/api/usuarios`, { 
            headers: { 'Authorization': AUTH_HEADER } 
        });
        
        if (resp.status === 401) return;

        const data = await resp.json();
        const tbody = document.getElementById('lista-usuarios');
        tbody.innerHTML = data.map(u => 
            `<tr><td>${u.id}</td><td>${u.username}</td><td>${u.rol}</td></tr>`
        ).join('');
    } catch (e) {
        console.log("Error al cargar lista de usuarios");
    }
}

async function guardarProducto() {
    const p = {
        codigo: document.getElementById('p-codigo').value,
        nombre: document.getElementById('p-nombre').value,
        cantidad: parseInt(document.getElementById('p-cant').value) || 0,
        precio: parseFloat(document.getElementById('p-precio').value) || 0
    };

    try {
        const resp = await fetch(`${API_URL}/api/productos`, {
            method: 'POST',
            headers: { 
                'Authorization': AUTH_HEADER, 
                'Content-Type': 'application/json' 
            },
            body: JSON.stringify(p)
        });

        if (resp.ok) {
            alert("Producto registrado con éxito");
            cargarProductos();
            document.getElementById('p-codigo').value = "";
            document.getElementById('p-nombre').value = "";
            document.getElementById('p-cant').value = "";
            document.getElementById('p-precio').value = "";
        } else {
            alert("No tienes permisos para realizar esta acción");
        }
    } catch (e) {
        alert("Error al intentar guardar el producto");
    }
}

function cerrarSesion() {
    location.reload();
}
</script>
</body>
</html>
