<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Agrícola - Los 3 Patitos</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #2d5a27; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="seccion-login">
        <h2>Ingreso al Sistema</h2>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="ejecutarLogin()">Entrar</button>
        <p id="msg-login" style="color: red;"></p>
    </div>

    <div id="panel-principal" class="hidden">
        <div style="display: flex; justify-content: space-between;">
            <h2>Panel Agrícola</h2>
            <button onclick="location.reload()" style="width: 100px; background-color: #6c757d;">Salir</button>
        </div>
        <div id="lista-productos">Cargando productos...</div>
    </div>
</div>

<script>
let AUTH_HEADER = "";

async function ejecutarLogin() {
    const user = document.getElementById('user').value;
    const pass = document.getElementById('pass').value;
    AUTH_HEADER = 'Basic ' + btoa(user + ':' + pass);

    try {
        const resp = await fetch('/api/usuarios/login', {
            method: 'POST',
            headers: { 
                'Authorization': AUTH_HEADER,
                'Content-Type': 'application/json' 
            },
            body: JSON.stringify({ username: user, password: pass })
        });

        const texto = await resp.text();
        if (resp.ok && texto.includes("✅")) {
            document.getElementById('seccion-login').classList.add('hidden');
            document.getElementById('panel-principal').classList.remove('hidden');
            cargarProductos();
        } else {
            document.getElementById('msg-login').innerText = "Credenciales incorrectas";
        }
    } catch (e) {
        document.getElementById('msg-login').innerText = "Error de conexión";
    }
}

async function cargarProductos() {
    try {
        const resp = await fetch('/api/productos', {
            headers: { 'Authorization': AUTH_HEADER }
        });
        if (resp.ok) {
            const data = await resp.json();
            let html = "<table><tr><th>Código</th><th>Nombre</th><th>Cantidad</th><th>Precio</th></tr>";
            data.forEach(p => {
                html += `<tr><td>${p.codigo}</td><td>${p.nombre}</td><td>${p.cantidad}</td><td>$${p.precio}</td></tr>`;
            });
            html += "</table>";
            document.getElementById('lista-productos').innerHTML = html;
        }
    } catch (e) {
        document.getElementById('lista-productos').innerHTML = "Error al cargar datos.";
    }
}
</script>
</body>
</html>
