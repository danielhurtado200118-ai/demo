<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sistema Agrícola</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eee; }
        .box { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .hidden { display: none; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; }
        button { background: #28a745; color: white; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>
<div class="box">
    <div id="p-login">
        <h2>Login</h2>
        <input type="text" id="u" placeholder="Usuario">
        <input type="password" id="p" placeholder="Clave">
        <button onclick="login()">Entrar</button>
        <p id="err" style="color:red"></p>
    </div>

    <div id="p-gestion" class="hidden">
        <h2>Inventario Agrícola</h2>
        <input type="text" id="n" placeholder="Nombre">
        <input type="number" id="c" placeholder="Cantidad">
        <button onclick="guardar()">Guardar Producto</button>
        <table>
            <thead><tr><th>Nombre</th><th>Cant.</th></tr></thead>
            <tbody id="lista"></tbody>
        </table>
        <button onclick="location.reload()" style="background:#666; margin-top:20px;">Salir</button>
    </div>
</div>

<script>
    const API = "https://backend-agricola.onrender.com";

    async function login() {
        const res = await fetch(API + "/api/usuarios/login", {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: document.getElementById('u').value, password: document.getElementById('p').value})
        });
        const txt = await res.text();
        if(txt.includes("✅")) {
            document.getElementById('p-login').classList.add('hidden');
            document.getElementById('p-gestion').classList.remove('hidden');
            ver();
        } else {
            document.getElementById('err').innerText = "Error de acceso";
        }
    }

    async function ver() {
        const res = await fetch(API + "/api/productos");
        const datos = await res.json();
        let h = "";
        datos.forEach(i => { h += "<tr><td>"+i.nombre+"</td><td>"+i.cantidad+"</td></tr>"; });
        document.getElementById('lista').innerHTML = h;
    }

    async function guardar() {
        await fetch(API + "/api/productos", {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({nombre: document.getElementById('n').value, cantidad: parseInt(document.getElementById('c').value)})
        });
        ver();
    }
</script>
</body>
</html>
