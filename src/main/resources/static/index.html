<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Agrícola - Los 3 Patitos</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 40px; }
        .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        input, button, select { padding: 12px; margin: 10px 0; width: 100%; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #218838; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #2d5a27; color: white; }
        .header-panel { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2d5a27; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="pestaña-login">
        <h2 style="text-align:center; color: #2d5a27;">Ingreso Agrícola</h2>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="entrarAlSistema()">Iniciar Sesión</button>
        <p id="error-msg" style="color: red; text-align: center; font-weight: bold;"></p>
    </div>

    <div id="pestaña-panel" class="hidden">
        <div class="header-panel">
            <h2>Panel de Gestión</h2>
            <button onclick="location.reload()" style="width: 120px; background: #6c757d;">Salir</button>
        </div>
        
        <p id="msg-bienvenida" style="font-weight: bold; color: #444;"></p>

        <div style="background: #e9f7ef; padding: 15px; border-radius: 8px;">
            <h3>Registrar Producto</h3>
            <input type="text" id="p-nombre" placeholder="Nombre del Producto">
            <input type="number" id="p-cantidad" placeholder="Cantidad">
            <button onclick="guardarProducto()">Agregar al Inventario</button>
        </div>

        <table>
            <thead>
                <tr><th>Producto</th><th>Cantidad</th><th>Acciones</th></tr>
            </thead>
            <tbody id="cuerpo-tabla"></tbody>
        </table>
    </div>
</div>

<script>
    const API = "https://backend-agricola.onrender.com";

    async function entrarAlSistema() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;

        try {
            const resp = await fetch(`${API}/api/usuarios/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            const data = await resp.text();

            if (data.includes("✅")) {
                document.getElementById('pestaña-login').classList.add('hidden');
                document.getElementById('pestaña-panel').classList.remove('hidden');
                document.getElementById('msg-bienvenida').innerText = `Usuario activo: ${u}`;
                actualizarTabla();
            } else {
                document.getElementById('error-msg').innerText = "Acceso denegado.";
            }
        } catch (e) {
            document.getElementById('error-msg').innerText = "Servidor no responde.";
        }
    }

    async function actualizarTabla() {
        const resp = await fetch(`${API}/api/productos`);
        const productos = await resp.json();
        const tabla = document.getElementById('cuerpo-tabla');
        tabla.innerHTML = "";
        
        productos.forEach(p => {
            tabla.innerHTML += `<tr>
                <td>${p.nombre}</td>
                <td>${p.cantidad}</td>
                <td><button onclick="borrar(${p.id})" style="background:#dc3545; padding:5px; width:auto;">Eliminar</button></td>
            </tr>`;
        });
    }

    async function guardarProducto() {
        const n = document.getElementById('p-nombre').value;
        const c = document.getElementById('p-cantidad').value;
        
        await fetch(`${API}/api/productos`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nombre: n, cantidad: parseInt(c) })
        });
        actualizarTabla();
    }

    async function borrar(id) {
        await fetch(`${API}/api/productos/${id}`, { method: 'DELETE' });
        actualizarTabla();
    }
</script>
</body>
</html>
